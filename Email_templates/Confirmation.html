<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Welcome to Ziea</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F8F7F3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #F8F7F3; padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF; border: 1px solid #EBE9E0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
          
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 40px 0 20px 0;">
              <h1 style="margin: 0; font-family: Georgia, serif; font-style: italic; font-size: 32px; color: #2C3C30; letter-spacing: 1px;">Ziea</h1>
            </td>
          </tr>
          
          <!-- Divider -->
          <tr>
            <td align="center">
              <div style="width: 40px; height: 1px; background-color: #798C7C; margin: 0 auto;"></div>
            </td>
          </tr>
          
          <!-- Body -->
          <tr>
            <td align="center" style="padding: 40px 50px;">
              <h2 style="margin: 0 0 20px 0; font-family: Georgia, serif; font-size: 24px; color: #2C3C30; font-weight: normal;">Welcome to the Digital Atelier</h2>
              
              <p style="margin: 0 0 30px 0; font-size: 15px; line-height: 1.6; color: #5B5B5B; font-weight: 300;">
                Thank you for joining Ziea. To complete your registration and unlock your curated experience in intentional living, please verify your email address.
              </p>
              
              <!-- CTA Button -->
              <table border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center" style="border-radius: 30px; background-color: #798C7C;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="font-size: 11px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #ffffff; text-decoration: none; border-radius: 30px; padding: 14px 32px; border: 1px solid #798C7C; display: inline-block; letter-spacing: 2px; text-transform: uppercase;">Verify Account</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td align="center" style="padding: 30px 50px 40px 50px; background-color: #FAFAFA; border-top: 1px solid #EBE9E0;">
              <p style="margin: 0; font-size: 10px; color: #999999; text-transform: uppercase; letter-spacing: 2px;">
                © 2026 Ziea Digital Atelier<br>
                <span style="text-transform: none; letter-spacing: normal; margin-top: 10px; display: inline-block;">If you did not request this, please safely ignore this email.</span>
              </p>
            </td>
          </tr>
          
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
